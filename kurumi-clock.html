<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafkiel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#111;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
  }
  #svg{
    width:620px;height:620px;overflow:visible;
    filter:drop-shadow(0 0 30px rgba(210,150,20,.5))
           drop-shadow(0 0 80px rgba(180,100,10,.3));
  }
  .timelabel{
    color:rgba(200,150,30,.7);font-family:'Cinzel',serif;
    font-size:.8rem;letter-spacing:.5em;margin-top:14px;
  }

  /* Outer ring slow rotation */
  @keyframes ringRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes ringRotR{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
</style>
</head>
<body>
<svg id="svg" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Light gold face gradient (как на скріншоті — яскравий) -->
  <radialGradient id="gFace" cx="45%" cy="38%">
    <stop offset="0%"   stop-color="#fff8cc"/>
    <stop offset="35%"  stop-color="#f0d060"/>
    <stop offset="70%"  stop-color="#d4a020"/>
    <stop offset="100%" stop-color="#b07800"/>
  </radialGradient>

  <!-- Face outer ring — трохи темніший золотий -->
  <radialGradient id="gRing" cx="50%" cy="30%">
    <stop offset="0%"   stop-color="#fce870"/>
    <stop offset="50%"  stop-color="#c89018"/>
    <stop offset="100%" stop-color="#8a5c00"/>
  </radialGradient>

  <!-- Bezel/rim — насичений золотий -->
  <linearGradient id="gBezel" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%"   stop-color="#fdeea0"/>
    <stop offset="30%"  stop-color="#e8b828"/>
    <stop offset="60%"  stop-color="#c08010"/>
    <stop offset="100%" stop-color="#7a5000"/>
  </linearGradient>

  <!-- Dark center window for gears -->
  <radialGradient id="gDark" cx="50%" cy="40%">
    <stop offset="0%"   stop-color="#1a0c02"/>
    <stop offset="60%"  stop-color="#0e0600"/>
    <stop offset="100%" stop-color="#060200"/>
  </radialGradient>

  <!-- Gear body -->
  <radialGradient id="gGear" cx="38%" cy="32%">
    <stop offset="0%"   stop-color="#e8c060"/>
    <stop offset="55%"  stop-color="#c09020"/>
    <stop offset="100%" stop-color="#6a4000"/>
  </radialGradient>

  <!-- Shard gradient -->
  <linearGradient id="gShard" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#fde878"/>
    <stop offset="45%"  stop-color="#d4a020"/>
    <stop offset="100%" stop-color="#8a5a00"/>
  </linearGradient>

  <!-- Crimson for gear accents -->
  <radialGradient id="gCrim" cx="50%" cy="40%">
    <stop offset="0%"   stop-color="#a82010"/>
    <stop offset="100%" stop-color="#3c0800"/>
  </radialGradient>

  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowHard" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feFlood flood-color="#c01808" flood-opacity=".5" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="cb"/>
    <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Clip to face circle -->
  <clipPath id="faceClip">
    <circle cx="310" cy="310" r="185"/>
  </clipPath>
  <clipPath id="gearClip">
    <circle cx="310" cy="310" r="108"/>
  </clipPath>

  <!-- Outer ring segment gradient — amber+gold like original -->
  <linearGradient id="gOuterSeg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#fde878"/>
    <stop offset="30%"  stop-color="#d4920c"/>
    <stop offset="70%"  stop-color="#b07208"/>
    <stop offset="100%" stop-color="#7a4c00"/>
  </linearGradient>
  <!-- Highlight edge on segments -->
  <linearGradient id="gSegHL" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fef0a0"/>
    <stop offset="100%" stop-color="#c08010"/>
  </linearGradient>

  <!-- Outer ring segment fill — amber→gold -->
  <linearGradient id="gSegFill" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%"   stop-color="#fde070"/>
    <stop offset="25%"  stop-color="#e8a818"/>
    <stop offset="60%"  stop-color="#c07808"/>
    <stop offset="100%" stop-color="#804e00"/>
  </linearGradient>
</defs>

  <!-- Second hand — thin red needle -->

</svg>
<div class="timelabel" id="td">--:--:--</div>

<script>
(function(){
  var ns='http://www.w3.org/2000/svg';
  var cx=310, cy=310;

  // Bezel ticks (72)
  var bt=document.getElementById('bezelTicks');
  for(var i=0;i<72;i++){
    var a=(i/72)*Math.PI*2-Math.PI/2;
    var big=i%6===0, r1=192, r2=big?180:187;
    var l=document.createElementNS(ns,'line');
    l.setAttribute('x1',(cx+r1*Math.cos(a)).toFixed(2));
    l.setAttribute('y1',(cy+r1*Math.sin(a)).toFixed(2));
    l.setAttribute('x2',(cx+r2*Math.cos(a)).toFixed(2));
    l.setAttribute('y2',(cy+r2*Math.sin(a)).toFixed(2));
    l.setAttribute('stroke',big?'rgba(0,0,0,.6)':'rgba(0,0,0,.4)');
    l.setAttribute('stroke-width',big?'3':'1.5');
    bt.appendChild(l);
  }

  // Face ticks — on the outer gold ring, dark marks
  var ft=document.getElementById('faceTicks');
  for(var j=0;j<60;j++){
    var fa=(j/60)*Math.PI*2-Math.PI/2;
    var big5=j%5===0;
    var fr1=big5?168:170, fr2=big5?178:174;
    var fl=document.createElementNS(ns,'line');
    fl.setAttribute('x1',(cx+fr1*Math.cos(fa)).toFixed(2));
    fl.setAttribute('y1',(cy+fr1*Math.sin(fa)).toFixed(2));
    fl.setAttribute('x2',(cx+fr2*Math.cos(fa)).toFixed(2));
    fl.setAttribute('y2',(cy+fr2*Math.sin(fa)).toFixed(2));
    fl.setAttribute('stroke','rgba(80,40,0,.7)');
    fl.setAttribute('stroke-width',big5?'2.5':'1.2');
    ft.appendChild(fl);
  }

  // Diamond markers between hour positions (like original has small diamond shapes)
  var dm=document.getElementById('diamondMarks');
  for(var d=0;d<48;d++){
    var da=(d/48)*Math.PI*2-Math.PI/2;
    // Skip positions that would overlap with numerals (every 4th)
    var dr=173;
    var dx=cx+dr*Math.cos(da), dy2=cy+dr*Math.sin(da);
    if(d%4===0){ // larger diamond at sub-hour positions
      var s=3.5;
      var poly=document.createElementNS(ns,'polygon');
      poly.setAttribute('points',
        dx.toFixed(1)+','+(dy2-s).toFixed(1)+' '+
        (dx+s).toFixed(1)+','+dy2.toFixed(1)+' '+
        dx.toFixed(1)+','+(dy2+s).toFixed(1)+' '+
        (dx-s).toFixed(1)+','+dy2.toFixed(1));
      poly.setAttribute('fill','rgba(80,40,0,.6)');
      dm.appendChild(poly);
    } else {
      var c2=document.createElementNS(ns,'circle');
      c2.setAttribute('cx',dx.toFixed(2));
      c2.setAttribute('cy',dy2.toFixed(2));
      c2.setAttribute('r','1.4');
      c2.setAttribute('fill','rgba(80,40,0,.45)');
      dm.appendChild(c2);
    }
  }

  // Roman numerals — dark on bright gold face
  var romans=['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
  var rn=document.getElementById('romanNums');
  for(var r=0;r<12;r++){
    var ra=(r/12)*Math.PI*2-Math.PI/2;
    var rr=143;
    var t=document.createElementNS(ns,'text');
    t.setAttribute('x',(cx+rr*Math.cos(ra)).toFixed(2));
    t.setAttribute('y',(cy+rr*Math.sin(ra)).toFixed(2));
    t.setAttribute('font-family','Cinzel,serif');
    t.setAttribute('font-size',r===0?'20':r%3===0?'18':'15');
    t.setAttribute('font-weight',r===0||r%3===0?'700':'400');
    // Dark brown/black on bright gold — like original
    t.setAttribute('fill',r===0?'#1a0a00':'rgba(40,18,0,.85)');
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    rn.appendChild(t);
    t.textContent=romans[r];
  }
})();

// Gears
var gears=[
  {id:'gearC',  cx:310,cy:310, spd:.12, a:0},
  {id:'gearT',  cx:340,cy:258, spd:-.35,a:0},
  {id:'gearBR', cx:350,cy:355, spd:.32, a:0},
  {id:'gearL',  cx:268,cy:348, spd:-.55,a:0},
  {id:'gearTC', cx:290,cy:255, spd:.65, a:0},
  {id:'gearB',  cx:318,cy:390, spd:-.48,a:0},
];

function tickG(){
  gears.forEach(function(g){
    g.a+=g.spd;
    document.getElementById(g.id).setAttribute('transform',
      'translate('+g.cx+','+g.cy+') rotate('+g.a+') translate(-'+g.cx+',-'+g.cy+')');
  });
}

function updateH(){
  var now=new Date();
  var h=now.getHours()%12,m=now.getMinutes(),
      s=now.getSeconds(),ms=now.getMilliseconds();
  var sD=(s+ms/1000)*6;
  var mD=(m+s/60)*6;
  var hD=(h+m/60)*30;
  document.getElementById('hourHand').setAttribute('transform','rotate('+hD+')');
  document.getElementById('minuteHand').setAttribute('transform','rotate('+mD+')');
  document.getElementById('secondHand').setAttribute('transform','rotate('+sD+')');
  var p=function(n){return n<10?'0'+n:''+n;};
  document.getElementById('td').textContent=p(now.getHours())+':'+p(m)+':'+p(s);
}

var lt=0;
function loop(ts){
  if(ts-lt>16){tickG();lt=ts;}
  updateH();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
